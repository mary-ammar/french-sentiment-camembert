name: CI

on:
    push:
    pull_request:
        branches: [main]

jobs:
    lint-and-test:
        runs-on: ubuntu-latest

        steps:
          - name: Checkout
            uses: actions/checkout@v4
    
          - name: Set up Python
            uses: actions/setup-python@v5
            with:
              python-version: "3.10"
              cache: "pip"
    
          - name: Install dependencies
            run: |
              pip install --upgrade pip
              pip install torch transformers datasets scikit-learn \
                          matplotlib pandas numpy evaluate accelerate
    
          - name: Check imports
            run: |
              python -c "import torch; import transformers; import datasets; print('All imports OK')"
    
          - name: Run tests
            run: |
              python -m pytest tests/ -v --tb=short
            continue-on-error: true
