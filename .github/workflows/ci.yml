name: CI

on:
    push:
    pull_request:
        branches: [main]

jobs:
    lint-and-test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                python-version: '3.10'

            - name: Install dependencies
              run: |
                pip install datasets pandas matplotlib scikit-learn flake8 pytest            
            
            - name: Check code style
              run: |
                flake8 src/ scripts/ --max-line-length=88 --ignore=E501,E302,W503
              continue-on-error: true
            
            - name: Run tests
              run: |
                pytest tests/ -v
            
            - name: Check dataset loading
              run: |
                python -c "
                from datasets import load_dataset
                dataset = load_dataset('allocine')
                assert len(dataset['train']) == 160000, 'Train size incorrect'
                assert len(dataset['test']) == 20000, 'Test size incorrect'
                print('Dataset loaded successfully!')"